name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  preflight-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile
      - run: bun run preflight
      - run: bun run test:unit
      - run: bun run test:e2e:api

  dashboard-e2e:
    runs-on: ubuntu-latest
    needs: preflight-and-unit
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile
      - run: bun run i18n:compile && bun run build:dashboard

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - run: bunx playwright install --with-deps chromium

      - name: Start aio-proxy
        run: |
          mkdir -p "$RUNNER_TEMP/aio-proxy-home/.config/aio-proxy"
          printf '{"server":{"port":22078,"dashboardPort":22079},"providers":[]}\n' > "$RUNNER_TEMP/aio-proxy-home/.config/aio-proxy/config.jsonc"
          HOME="$RUNNER_TEMP/aio-proxy-home" bun run --filter @aio-proxy/cli start &
          echo "$!" > "$RUNNER_TEMP/aio-proxy.pid"

      - name: Wait for health
        run: |
          for _ in {1..30}; do
            curl -fsS http://127.0.0.1:22078/health && exit 0
            sleep 1
          done
          exit 1

      - run: bunx playwright test tests/dashboard --pass-with-no-tests

      - if: always()
        run: |
          if [ -f "$RUNNER_TEMP/aio-proxy.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/aio-proxy.pid")" || true
          fi
