name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  version-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - uses: changesets/action@v1
        with:
          version: bunx changeset version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      needs-release: ${{ steps.meta.outputs.needs-release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - id: meta
        run: |
          version="$(jq -r .version npm/aio-proxy/package.json)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          needs_release=false
          git rev-parse "v$version" >/dev/null 2>&1 || needs_release=true
          gh release view "v$version" >/dev/null 2>&1 || needs_release=true
          for package_dir in \
            packages/plugin-sdk \
            npm/cli-darwin-arm64 \
            npm/cli-darwin-x64 \
            npm/cli-linux-arm64 \
            npm/cli-linux-x64 \
            npm/aio-proxy
          do
            name="$(jq -r .name "$package_dir/package.json")"
            package_version="$(jq -r .version "$package_dir/package.json")"
            npm view "$name@$package_version" version >/dev/null 2>&1 || needs_release=true
          done
          echo "needs-release=$needs_release" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: check
    if: needs.check.outputs.needs-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run i18n:compile
      - run: bun run build:dashboard
      - name: Build embedded plugin workspace packages
        run: |
          bun run --filter @aio-proxy/plugin-sdk build
          bun run --filter @aio-proxy/plugin-github-copilot build
          bun run --filter @aio-proxy/plugin-openai-chatgpt build
      - run: bun run --filter @aio-proxy/cli build:binary
      - run: tar -cf npm-binaries.tar npm/cli-*/bin/aio-proxy
      - uses: actions/upload-artifact@v4
        with:
          name: npm-binaries
          path: npm-binaries.tar
          if-no-files-found: error

  smoke:
    needs: build
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            binary: npm/cli-linux-x64/bin/aio-proxy
          - runner: ubuntu-24.04-arm
            binary: npm/cli-linux-arm64/bin/aio-proxy
          - runner: macos-latest
            binary: npm/cli-darwin-arm64/bin/aio-proxy
          - runner: macos-latest
            binary: npm/cli-darwin-x64/bin/aio-proxy
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: npm-binaries
      - run: tar -xf npm-binaries.tar
      - run: |
          chmod +x "${{ matrix.binary }}"
          "./${{ matrix.binary }}" --version

  publish:
    needs: [check, smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: npm-binaries
      - run: tar -xf npm-binaries.tar
      - name: Build public SDK
        run: bun run --filter @aio-proxy/plugin-sdk build
      - name: Configure npm auth
        run: printf '//registry.npmjs.org/:_authToken=%s\n' "$NODE_AUTH_TOKEN" > ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish verified public packages
        run: bun scripts/publish-public-packages.ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create or update GitHub Release
        run: |
          mkdir -p release-assets
          cp npm/cli-darwin-arm64/bin/aio-proxy release-assets/aio-proxy-darwin-arm64
          cp npm/cli-darwin-x64/bin/aio-proxy release-assets/aio-proxy-darwin-x64
          cp npm/cli-linux-x64/bin/aio-proxy release-assets/aio-proxy-linux-x64
          cp npm/cli-linux-arm64/bin/aio-proxy release-assets/aio-proxy-linux-arm64
          if gh release view "v${{ needs.check.outputs.version }}" >/dev/null 2>&1; then
            gh release upload "v${{ needs.check.outputs.version }}" release-assets/aio-proxy-* --clobber
          else
            gh release create "v${{ needs.check.outputs.version }}" \
              release-assets/aio-proxy-* \
              --title "v${{ needs.check.outputs.version }}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
